<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Giga LVGL mockup</title>
<style>
  html,body{margin:0;padding:0;background:#1a1a1a;}
  #frame{width:840px;padding:20px;box-sizing:border-box;}
  #bezel{background:#111214;border-radius:14px;padding:10px;}
  #screen{width:800px;height:480px;background:#0b0c0e;border-radius:4px;padding:10px;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
  .row{display:flex;align-items:center;}
  .col{display:flex;flex-direction:column;}
  .muted{color:#8a8d92;}
  .dim{color:#6b6e73;}
  .primary{color:#f2f2f0;}
</style>
</head>
<body>
<div id="frame"><div id="bezel"><div id="screen"></div></div></div>
<script>
function svgArrow(dir,color){
  var path = dir==='up' ? 'M6 2 L10 8 L2 8 Z' : 'M6 10 L10 4 L2 4 Z';
  return '<svg width="10" height="10" viewBox="0 0 12 12"><path d="'+path+'" fill="'+color+'"/></svg>';
}
function svgChevron(dir,color){
  var d = dir==='left' ? 'M8 2 L3 6 L8 10' : 'M3 2 L8 6 L3 10';
  return '<svg width="12" height="12" viewBox="0 0 12 12"><path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function svgCloud(color){
  return '<svg width="24" height="16" viewBox="0 0 24 16"><ellipse cx="8" cy="10" rx="7" ry="5" fill="'+color+'"/><ellipse cx="15" cy="8" rx="8" ry="6" fill="'+color+'"/><ellipse cx="21" cy="11" rx="5" ry="4" fill="'+color+'"/></svg>';
}
function svgSun(color){
  return '<svg width="18" height="18" viewBox="0 0 20 20"><circle cx="10" cy="10" r="5" fill="'+color+'"/><g stroke="'+color+'" stroke-width="1.4"><line x1="10" y1="0" x2="10" y2="3"/><line x1="10" y1="17" x2="10" y2="20"/><line x1="0" y1="10" x2="3" y2="10"/><line x1="17" y1="10" x2="20" y2="10"/></g></svg>';
}
function svgMoon(offset){
  return '<svg width="18" height="18" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="#8a8d92"/><circle cx="'+(10+offset)+'" cy="10" r="8" fill="#0b0c0e"/></svg>';
}

function backRow(){
  return '<div onclick="nav(\'home\')" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0 8px;">'+svgChevron('left','#8a8d92')+'<span style="font-size:12px;color:#8a8d92;">Home</span></div>';
}
function renderHome(){
  return '<div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:4px;height:100%;">'+
    '<div onclick="nav(\'time\')" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">'+
      '<div style="font-size:38px;font-weight:400;color:#f2f2f0;letter-spacing:-1px;">6:07 <span style="font-size:17px;color:#8a8d92;">PM</span></div>'+
      '<div style="font-size:12px;color:#8a8d92;">Monday, July 13</div>'+
      '<div onclick="event.stopPropagation();nav(\'almanac\')" style="display:flex;align-items:center;gap:6px;background:#17191c;border-radius:20px;padding:4px 10px 4px 12px;">'+svgCloud('#d6d7d9')+'<span style="font-size:13px;font-weight:bold;color:#d6d7d9;">Cloudy, 68&deg;F</span>'+svgChevron('right','#6b6e73')+'</div>'+
      '<div style="display:flex;align-items:center;gap:6px;background:#3a1f1c;border-radius:20px;padding:3px 10px 3px 8px;margin-top:2px;"><span style="width:6px;height:6px;border-radius:50%;background:#e2574c;display:inline-block;"></span><span style="font-size:11px;color:#e2574c;">On-peak &middot; $0.38/kWh</span></div>'+
    '</div>'+
    '<div onclick="nav(\'network\')" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">'+
      '<div style="display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#39d98a;display:inline-block;"></span><span style="font-size:16px;color:#d6d7d9;">Connected</span></div>'+
      '<div style="font-size:13px;color:#8a8d92;">HomeNet-5G</div>'+
      '<div style="display:flex;align-items:flex-end;gap:2px;height:12px;"><div style="width:3px;height:4px;background:#39d98a;border-radius:1px;"></div><div style="width:3px;height:6px;background:#39d98a;border-radius:1px;"></div><div style="width:3px;height:9px;background:#39d98a;border-radius:1px;"></div><div style="width:3px;height:12px;background:#33383f;border-radius:1px;"></div></div>'+
    '</div>'+
    '<div onclick="nav(\'battery\')" style="cursor:pointer;display:flex;align-items:center;justify-content:center;gap:16px;">'+
      '<svg viewBox="0 0 90 90" style="width:70px;height:70px;transform:rotate(-90deg);"><circle cx="45" cy="45" r="36" fill="none" stroke="#242629" stroke-width="8"/><circle cx="45" cy="45" r="36" fill="none" stroke="#3fd6c8" stroke-width="8" stroke-linecap="round" stroke-dasharray="226.2" stroke-dashoffset="40.7"/></svg>'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="font-size:26px;font-weight:400;color:#f2f2f0;">82<span style="font-size:14px;color:#8a8d92;">%</span></div><div style="display:flex;align-items:center;gap:4px;">'+svgArrow('down','#e8a53d')+'<span style="font-size:12px;color:#e8a53d;">Discharging 763W</span></div></div>'+
    '</div>'+
    '<div onclick="nav(\'grid\')" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;">'+
      '<svg viewBox="0 0 90 58" style="width:96px;height:62px;"><path d="M 11 48 A 34 34 0 0 1 42.04 14.13" fill="none" stroke="#3a2f1c" stroke-width="7" stroke-linecap="round"/><path d="M 42.04 14.13 A 34 34 0 0 1 47.96 14.13" fill="none" stroke="#2c3a2a" stroke-width="7" stroke-linecap="round"/><path d="M 47.96 14.13 A 34 34 0 0 1 79 48" fill="none" stroke="#3a2f1c" stroke-width="7" stroke-linecap="round"/><line x1="45" y1="48" x2="52.5" y2="18.96" stroke="#e8a53d" stroke-width="2.5" stroke-linecap="round"/><circle cx="45" cy="48" r="3.5" fill="#e8a53d"/></svg>'+
      '<div style="font-size:22px;font-weight:400;color:#f2f2f0;margin-top:-2px;">145 W</div><div style="font-size:12px;color:#e8a53d;">Importing</div>'+
    '</div>'+
  '</div>';
}
function renderTime(){
  return backRow()+
  '<div style="display:flex;flex-direction:column;align-items:center;gap:9px;padding-top:2px;">'+
    '<div style="font-size:40px;font-weight:400;color:#f2f2f0;">6:07 <span style="font-size:18px;color:#8a8d92;">PM</span></div>'+
    '<div style="font-size:13px;color:#8a8d92;">Monday, July 13</div>'+
    '<div style="width:88%;"><div style="display:flex;height:12px;border-radius:6px;overflow:hidden;"><div style="width:25%;background:#2f6b45;"></div><div style="width:16.67%;background:#6b4f22;"></div><div style="width:16.67%;background:#2f6b45;"></div><div style="width:8.33%;background:#6b4f22;"></div><div style="width:20.83%;background:#7a3128;"></div><div style="width:12.5%;background:#6b4f22;"></div></div>'+
    '<div style="position:relative;height:0;"><div style="position:absolute;left:75.5%;top:-18px;width:2px;height:14px;background:#f2f2f0;"></div></div></div>'+
    '<div style="display:flex;gap:14px;font-size:11px;color:#8a8d92;"><span><span style="color:#4fbf7a;">&#9679;</span> Super off-peak</span><span><span style="color:#e8a53d;">&#9679;</span> Off-peak</span><span><span style="color:#e2574c;">&#9679;</span> On-peak</span></div>'+
    '<div style="display:flex;align-items:center;gap:6px;background:#3a1f1c;border-radius:20px;padding:4px 12px;"><span style="width:6px;height:6px;border-radius:50%;background:#e2574c;display:inline-block;"></span><span style="font-size:12px;color:#e2574c;">On-peak &middot; $0.38/kWh &middot; until 9:00 PM</span></div>'+
  '</div>';
}
function renderNetwork(){
  return backRow()+
  '<div style="display:flex;flex-direction:column;gap:10px;padding-top:2px;">'+
    '<div style="display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#39d98a;display:inline-block;"></span><span style="font-size:16px;color:#d6d7d9;">Connected</span></div>'+
    '<table style="width:100%;font-size:12px;color:#8a8d92;border-collapse:collapse;">'+
      '<tr><td style="padding:3px 0;">SSID</td><td style="text-align:right;color:#d6d7d9;">HomeNet-5G</td></tr>'+
      '<tr><td style="padding:3px 0;">Signal</td><td style="text-align:right;color:#d6d7d9;">-52 dBm</td></tr>'+
      '<tr><td style="padding:3px 0;">IP address</td><td style="text-align:right;color:#d6d7d9;">192.168.1.42</td></tr>'+
      '<tr><td style="padding:3px 0;">MQTT broker</td><td style="text-align:right;color:#39d98a;">Connected</td></tr>'+
      '<tr><td style="padding:3px 0;">Line1Set</td><td style="text-align:right;color:#d6d7d9;">8s ago</td></tr>'+
      '<tr><td style="padding:3px 0;">Line2Set</td><td style="text-align:right;color:#d6d7d9;">11s ago</td></tr>'+
      '<tr><td style="padding:3px 0;">Battery/SoC</td><td style="text-align:right;color:#d6d7d9;">14s ago</td></tr>'+
      '<tr><td style="padding:3px 0;">Firmware</td><td style="text-align:right;color:#d6d7d9;">V1.0.10</td></tr>'+
    '</table>'+
  '</div>';
}
function renderBattery(){
  return backRow()+
  '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">'+
    '<div style="display:flex;align-items:center;justify-content:center;gap:16px;">'+
      '<svg viewBox="0 0 90 90" style="width:70px;height:70px;transform:rotate(-90deg);"><circle cx="45" cy="45" r="36" fill="none" stroke="#242629" stroke-width="8"/><circle cx="45" cy="45" r="36" fill="none" stroke="#3fd6c8" stroke-width="8" stroke-linecap="round" stroke-dasharray="226.2" stroke-dashoffset="42.9"/></svg>'+
      '<div style="display:flex;flex-direction:column;gap:2px;"><div style="font-size:26px;font-weight:400;color:#f2f2f0;">82<span style="font-size:14px;color:#8a8d92;">%</span></div><div style="display:flex;align-items:center;gap:4px;">'+svgArrow('down','#e8a53d')+'<span style="font-size:12px;color:#e8a53d;">Discharging 763W</span></div></div>'+
    '</div>'+
    '<div style="font-size:11px;color:#6b6e73;">Yesterday (Sun, Jul 12), 12 AM &ndash; 6:07 PM</div>'+
    '<svg viewBox="0 0 100 40" style="width:96%;height:80px;" preserveAspectRatio="none">'+
      '<polyline points="0.0,33.7 2.1,33.6 4.2,24.7 6.2,13.3 8.3,5.5 10.4,1.1 12.5,2.0 14.6,2.0 16.7,2.0 18.8,2.1 20.8,2.1 22.9,2.1 25.0,2.1 27.1,2.2 29.2,2.2 31.2,2.2 33.3,2.2 35.4,2.2 37.5,2.3 39.6,2.3 41.7,2.3 43.8,2.3 45.8,2.3 47.9,2.3 50.0,2.3 52.1,2.3 54.2,2.3 56.2,2.3 58.3,2.5" fill="none" stroke="#4fbf7a" stroke-width="2.2"/>'+
      '<polyline points="58.3,2.5 60.4,5.2 62.5,6.2 64.6,7.0 66.7,7.8 68.8,8.7 70.8,9.5 72.9,10.9 75.0,12.4 75.5,12.7" fill="none" stroke="#e8a53d" stroke-width="2.2"/>'+
      '<circle cx="75.5" cy="12.7" r="2.5" fill="#f2f2f0"/>'+
    '</svg>'+
    '<div style="display:flex;justify-content:space-between;width:96%;font-size:11px;color:#6b6e73;"><span>12 AM</span><span>Now</span></div>'+
    '<div style="display:flex;gap:14px;font-size:11px;color:#8a8d92;"><span><span style="color:#4fbf7a;">&#9679;</span> Charging (super off-peak, weekend)</span><span><span style="color:#e8a53d;">&#9679;</span> Discharging</span></div>'+
  '</div>';
}
function renderGrid(){
  return backRow()+
  '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">'+
    '<svg viewBox="0 0 90 58" style="width:130px;height:84px;"><path d="M 11 48 A 34 34 0 0 1 42.04 14.13" fill="none" stroke="#3a2f1c" stroke-width="7" stroke-linecap="round"/><path d="M 42.04 14.13 A 34 34 0 0 1 47.96 14.13" fill="none" stroke="#2c3a2a" stroke-width="7" stroke-linecap="round"/><path d="M 47.96 14.13 A 34 34 0 0 1 79 48" fill="none" stroke="#3a2f1c" stroke-width="7" stroke-linecap="round"/><line x1="45" y1="48" x2="52.5" y2="18.96" stroke="#e8a53d" stroke-width="2.5" stroke-linecap="round"/><circle cx="45" cy="48" r="3.5" fill="#e8a53d"/></svg>'+
    '<div style="font-size:24px;font-weight:400;color:#f2f2f0;margin-top:-6px;">145 W</div><div style="font-size:12px;color:#e8a53d;">Importing</div>'+
    '<div style="display:flex;gap:24px;margin-top:6px;">'+
      '<div style="text-align:center;"><div style="font-size:16px;color:#f2f2f0;">236 W</div><div style="font-size:11px;color:#6b6e73;">L1</div></div>'+
      '<div style="text-align:center;"><div style="font-size:16px;color:#f2f2f0;">234 W</div><div style="font-size:11px;color:#6b6e73;">L2</div></div>'+
      '<div style="text-align:center;"><div style="font-size:16px;color:#39d98a;">$4.20</div><div style="font-size:11px;color:#6b6e73;">Saved today</div></div>'+
    '</div>'+
    '<svg viewBox="0 0 100 24" style="width:70%;height:24px;margin-top:6px;" preserveAspectRatio="none"><line x1="0" y1="12" x2="100" y2="12" stroke="#242629" stroke-width="1"/><polyline points="0,14 15,10 30,16 45,8 60,15 75,9 100,12" fill="none" stroke="#e8a53d" stroke-width="2"/></svg>'+
  '</div>';
}
function renderAlmanac(){
  return backRow()+
  '<div style="display:flex;flex-direction:column;gap:9px;">'+
    '<div style="display:flex;align-items:center;justify-content:center;gap:10px;">'+svgCloud('#8a8d92')+'<div style="font-size:30px;font-weight:400;color:#f2f2f0;">68&deg;F</div><div style="font-size:13px;color:#8a8d92;">Cloudy</div></div>'+
    '<div style="display:flex;justify-content:space-around;">'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">'+svgSun('#e8a53d')+'<div style="font-size:13px;color:#d6d7d9;">5:58 AM</div><div style="font-size:11px;color:#6b6e73;">Sunrise</div></div>'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">'+svgSun('#e8a53d')+'<div style="font-size:13px;color:#d6d7d9;">8:41 PM</div><div style="font-size:11px;color:#6b6e73;">Sunset</div></div>'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">'+svgMoon(3.5)+'<div style="font-size:13px;color:#d6d7d9;">9:14 PM</div><div style="font-size:11px;color:#6b6e73;">Moonrise</div></div>'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">'+svgMoon(-3.5)+'<div style="font-size:13px;color:#d6d7d9;">6:37 AM</div><div style="font-size:11px;color:#6b6e73;">Moonset</div></div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;justify-content:center;gap:6px;">'+svgMoon(-12)+'<span style="font-size:12px;color:#c9cace;">Waxing gibbous &middot; 72% lit</span></div>'+
    '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:2px;">'+
      '<div style="font-size:15px;font-weight:bold;color:#5dc8e8;">Tide</div>'+
      '<svg viewBox="0 0 100 24" style="width:92%;height:40px;" preserveAspectRatio="none"><polyline points="0,14 8,4 17,10 25,20 33,10 42,4 50,14 58,20 67,10 75,4 83,14 92,20 100,14" fill="none" stroke="#5dc8e8" stroke-width="2"/></svg>'+
      '<div style="display:flex;justify-content:space-between;width:92%;font-size:11px;color:#6b6e73;"><span>High 3:58 PM</span><span>Low 10:47 PM</span></div>'+
    '</div>'+
  '</div>';
}
function nav(view){
  var s = document.getElementById('screen');
  if(view==='home') s.innerHTML = renderHome();
  else if(view==='time') s.innerHTML = renderTime();
  else if(view==='network') s.innerHTML = renderNetwork();
  else if(view==='battery') s.innerHTML = renderBattery();
  else if(view==='grid') s.innerHTML = renderGrid();
  else if(view==='almanac') s.innerHTML = renderAlmanac();
}
nav('home');
</script>
</body>
</html>
