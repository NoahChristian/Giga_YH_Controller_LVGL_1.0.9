  <div id="ssidLine" style="position:absolute; left:75%; top:35%; transform:translate(-50%,-50%); display:none; color:#6b6e73; text-align:center; line-height:1.3; white-space:nowrap; font-family:'Montserrat',sans-serif; font-size:4.2cqw;">---</div>
</div>
<div style="display:flex; gap:8px; justify-content:center; margin-top:16px;">
  <button id="btnConnecting" style="font-size:13px;">Show: Connecting</button>
  <button id="btnConnected" style="font-size:13px;">Show: Connected (real capture)</button>
  <button id="btnFailed" style="font-size:13px;">Show: Not connected</button>
</div>
<script>
const patch = document.getElementById("statePatch");
const statusRow = document.getElementById("statusRow");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const ssidLine = document.getElementById("ssidLine");
function setStatus(state) {
  if (state === "connected") {
    patch.style.display = "none";
    statusRow.style.display = "none";
    ssidLine.style.display = "none";
    return;
  }
  patch.style.display = "block";
  statusRow.style.display = "flex";
  ssidLine.style.display = "block";
  if (state === "connecting") {
    statusDot.style.background = "#e8a53d"; statusText.textContent = "Connecting"; statusText.style.color = "#e8a53d";
    ssidLine.innerHTML = "---";
  } else {
    statusDot.style.background = "#e2574c"; statusText.textContent = "Not connected"; statusText.style.color = "#e2574c";
    ssidLine.innerHTML = "click to<br/>select Wifi";
  }
}
document.getElementById("btnConnecting").onclick = () => setStatus("connecting");
document.getElementById("btnConnected").onclick = () => setStatus("connected");
document.getElementById("btnFailed").onclick = () => setStatus("failed");
</script>
